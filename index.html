<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約システム</title>

<style>
body {
  font-family: sans-serif;
  max-width: 700px;
  margin: 20px auto;
  font-size: 24px; /* ✅ 基本大きめ */
}

.title {
  font-weight: bold;
  margin-top: 20px;
  padding: 10px;
  font-size: 22px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px;
  border-bottom: 1px solid #ddd;
}

/* ✅ 空き */
.empty-row {
  background-color: #e8ffe8;
  border-left: 6px solid green;
}

/* ✅ 満席 */
.full-row {
  background-color: #ffeaea;
  border-left: 6px solid red;
}

/* 空きラベル */
.empty-label {
  color: green;
  font-weight: bold;
  font-size: 20px;
}

/* 通常文字 */
.label {
  font-size: 20px;
}

/* ボタン */
button {
  padding: 12px 16px;
  font-size: 16px;
  cursor: pointer;
  background-color: #f5f5f5;
  border-radius: 5px;
}

/* ✅ 満席ボタン */
.full-button {
  background-color: #fdd;
  border: 1px solid red;
}

/* ✅ スマホ（さらに大きく） */
@media (max-width: 600px) {

  body {
    font-size: 20px;
  }

  .title {
    font-size: 24px;
  }

  .row {
    flex-direction: column;
    align-items: stretch;
    padding: 16px;
  }

  .label {
    font-size: 22px;
  }

  .empty-label {
    font-size: 22px;
  }

  button {
    margin-top: 10px;
    width: 100%;
    font-size: 18px;
    padding: 16px;
  }
}
</style>

</head>

<body>

<h2>訓読チャレンジ予約システム</h2>
<button onclick="exportCSV()">CSV出力</button>

<div id="app"></div>

<!-- ✅ Firebase（ここ重要：タグ形式） -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

// ✅ Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyDvjXQ5xX_jwcHcXnESjjJalCq2xqL2qIw",
  authDomain: "reservation-2026.firebaseapp.com",
  databaseURL: "https://reservation-2026-default-rtdb.firebaseio.com/",
  projectId: "reservation-2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// ✅ 予約ルール
const seatRuleConfig = {
  weekIncrement: 35,
  anchors: [
    { date: "2026-06-14", start: 131, dow: 0 },
    { date: "2026-06-15", start: 136, dow: 1 },
    { date: "2026-06-28", start: 1,   dow: 0 },
    { date: "2026-06-29", start: 6,   dow: 1 }
  ],
  validUntil: "2026-08-03"
};


// ✅ 開始番号
function getSeatStartNumber(dateStr) {
  const date = new Date(dateStr);
  const dow = date.getDay();

  const anchors = seatRuleConfig.anchors
    .map(a => ({ ...a, d: new Date(a.date) }))
    .filter(a => a.d <= date && a.dow === dow)
    .sort((a, b) => b.d - a.d);

  if (anchors.length === 0) return null;

  const base = anchors[0];

  const weeks = Math.floor((date - base.d) / (7*24*60*60*1000));

  return base.start + weeks * seatRuleConfig.weekIncrement;
}


// ✅ 日付リスト生成
function generateDates() {
  const result = [];
  const today = new Date();
  today.setHours(0,0,0,0);

  const end = new Date(seatRuleConfig.validUntil);
  end.setHours(23,59,59,999);

  for (let d = new Date("2026-01-01"); d <= end; d.setDate(d.getDate()+1)) {
    d.setHours(0,0,0,0);
    if (d < today) continue;

    const day = d.getDay();
    if (day === 0 || day === 1) {
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const dd = String(d.getDate()).padStart(2,"0");

      result.push(`${yyyy}-${mm}-${dd}`);
    }
  }

  return result;
}

const dates = generateDates();
const SEAT_COUNT = 5;


// ✅ 描画
function render(data) {

  const app = document.getElementById("app");
  app.innerHTML = "";

  dates.forEach(date => {

    const start = getSeatStartNumber(date);
    if (start === null) return;

    const d = new Date(date);
    const day = d.getDay();
    const dayText = (day === 0) ? "日" : "月";

    const title = document.createElement("div");

    if (day === 0) {
      title.style.color = "red";
      title.style.background = "#ffeaea";
    } else {
      title.style.color = "green";
      title.style.background = "#eaffea";
    }

    title.className = "title";
    title.textContent = `■ 予約（${date} ${dayText}）`;
    app.appendChild(title);

    // ✅ 使用数計算
    let used = 0;
    for (let i = 0; i < SEAT_COUNT; i++) {
      const seat = start + i;
      if (data?.[date]?.[seat]) used++;
    }

    const remain = SEAT_COUNT - used;

    const remainDiv = document.createElement("div");

    if (remain === 0) {
      remainDiv.innerHTML = `<b style="color:red;">🔴 満席</b>`;
    } else {
      remainDiv.innerHTML = `<b style="color:green;">🟢 空き：あと${remain}席</b>`;
    }

    app.appendChild(remainDiv);

    // ✅ 各席
    for (let i=0; i<SEAT_COUNT; i++) {

      const seat = start + i;
      const name = data?.[date]?.[seat] || "";

      const row = document.createElement("div");
      row.className = "row";

      if (!name) row.classList.add("empty-row");
      if (remain === 0) row.classList.add("full-row");

      const label = document.createElement("div");
      label.className = "label";

      if (!name) {
        label.innerHTML = `${seat} <span class="empty-label">🟢 空き</span>`;
      } else {
        label.textContent = `${seat} ${name}`;
      }

      const btn = document.createElement("button");
      btn.textContent = "編集";

      if (remain === 0) {
        btn.classList.add("full-button");
      }

      btn.onclick = () => {

        const input = prompt("名前入力（空欄で削除）", name);

        if (input === null) return;

        const ref = db.ref(`reservations/${date}/${seat}`);

        if (input.trim() === "") {
          ref.remove();
        } else {
          ref.set(input.trim());
        }
      };

      row.appendChild(label);
      row.appendChild(btn);

      app.appendChild(row);
    }

  });
}


// ✅ リアルタイム更新
db.ref("reservations").on("value", snap => {
  render(snap.val());
});


// ✅ CSV出力
function exportCSV() {
  db.ref("reservations").once("value", snap => {

    let csv = "日付,席番号,名前\n";
    const data = snap.val() || {};

    Object.entries(data).forEach(([date, seats]) => {
      Object.entries(seats).forEach(([seat, name]) => {
        csv += `${date},${seat},${name}\n`;
      });
    });

    const blob = new Blob([csv], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "reservations.csv";
    a.click();
  });
}

</script>

</body>
</html>
