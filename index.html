<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約システム</title>

<style>
body { font-family: sans-serif; max-width: 700px; margin: 40px auto; }
.title { font-weight: bold; margin-top: 15px; padding: 5px; }
.row { padding: 5px; border-bottom: 1px solid #ddd; }
.empty { color: blue; cursor: pointer; }
.filled { color: black; cursor: pointer; }
</style>

</head>
<body>

<h2>予約システム</h2>
<button onclick="exportCSV()">CSV出力</button>
<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// ✅ Firebase設定（ここを書き換える）
const firebaseConfig = {
  apiKey: "AIzaSyDvjXQ5xX_jwcHcXnESjjJalCq2xqL2qIw",
  authDomain: "reservation-2026.firebaseapp.com",
  databaseURL: "https://reservation-2026-default-rtdb.firebaseio.com/",
  projectId: "reservation-2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// ✅ 業務ルール
const seatRuleConfig = {
  weekIncrement: 35,
  anchors: [
    { date: "2026-06-14", start: 131, dow: 0 },
    { date: "2026-06-15", start: 136, dow: 1 },
    { date: "2026-06-28", start: 1,   dow: 0 },
    { date: "2026-06-29", start: 6,   dow: 1 }
  ],
  validUntil: "2026-08-03"
};

// ✅ 開始番号計算
function getSeatStartNumber(dateStr) {
  const date = new Date(dateStr);
  const dow = date.getDay();

  const anchors = seatRuleConfig.anchors
    .map(a => ({ ...a, d: new Date(a.date) }))
    .filter(a => a.d <= date && a.dow === dow)
    .sort((a, b) => b.d - a.d);

  if (anchors.length === 0) return null;

  const base = anchors[0];

  const weeks = Math.floor(
    (date - base.d) / (7 * 24 * 60 * 60 * 1000)
  );

  return base.start + weeks * seatRuleConfig.weekIncrement;
}


// ✅ 日付生成（日曜・月曜のみ）
function generateDates() {
  const result = [];

  const today = new Date();
  today.setHours(0,0,0,0);

  const end = new Date(seatRuleConfig.validUntil);
  end.setHours(23,59,59,999);

  for (let d = new Date("2026-01-01"); d <= end; d.setDate(d.getDate()+1)) {
    d.setHours(0,0,0,0);

    if (d < today) continue;

    const day = d.getDay();
    if (day === 0 || day === 1) {

      const yyyy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const dd = String(d.getDate()).padStart(2,"0");

      result.push(`${yyyy}-${mm}-${dd}`);
    }
  }

  return result;
}

const dates = generateDates();
const SEAT_COUNT = 5;


// ✅ 描画
function render(data) {
  const app = document.getElementById("app");
  app.innerHTML = "";

  dates.forEach(date => {

    const start = getSeatStartNumber(date);
    if (start === null) return;

    const d = new Date(date);
    const day = d.getDay();

    let dayText = "";
    if (day === 0) dayText = "日";
    if (day === 1) dayText = "月";

    const title = document.createElement("div");

    // ✅ 色分け
    if (day === 0) {
      title.style.color = "red";
      title.style.background = "#ffeaea";
    }
    if (day === 1) {
      title.style.color = "green";
      title.style.background = "#eaffea";
    }

    title.className = "title";
    title.textContent = `■ 予約（${date} ${dayText}）［開始番号：${start}］`;

    app.appendChild(title);

    for (let i = 0; i < SEAT_COUNT; i++) {
      const seat = start + i;
      const name = data?.[date]?.[seat] || "";

      const row = document.createElement("div");

      // ✅ 表示
      if (!name) {
        row.textContent = `${seat} 空き`;
        row.className = "row empty";
      } else {
        row.textContent = `${seat} ${name}`;
        row.className = "row filled";
      }

      // ✅ 全ユーザー編集可能
      row.onclick = () => {
        const action = prompt(
          "操作:\n1: 新規/上書き\n2: 名前変更\n3: 削除"
        );

        const ref = db.ref(`reservations/${date}/${seat}`);

        if (action === "1") {
          const name = prompt("名前入力");
          if (name) ref.set(name);
        }

        if (action === "2") {
          const newName = prompt("新しい名前");
          if (newName) ref.set(newName);
        }

        if (action === "3") {
          if (confirm("削除しますか？")) ref.remove();
        }
      };

      app.appendChild(row);
    }
  });
}


// ✅ リアルタイム監視
db.ref("reservations").on("value", snap => {
  render(snap.val());
});


// ✅ CSV出力
function exportCSV() {
  db.ref("reservations").once("value", snap => {
    let csv = "日付,席番号,名前\n";
    const data = snap.val() || {};

    Object.entries(data).forEach(([d,v])=>{
      Object.entries(v).forEach(([s,n])=>{
        csv += `${d},${s},${n}\n`;
      });
    });

    const blob = new Blob([csv], {type: "text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "reservations.csv";
    a.click();
  });
}
</script>

</body>
</html>
