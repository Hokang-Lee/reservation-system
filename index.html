<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>訓読チャレンジ予約システム</title>

<style>
body {
  font-family: sans-serif;
  max-width: 700px;
  margin: 20px auto;
  font-size: 18px;
}

/* タイトル */
.title {
  font-weight: bold;
  margin-top: 20px;
  padding: 10px;
  font-size: 22px;
}

/* 行 */
.row {
  display: flex;
  align-items: center;
  padding: 12px;
  border-bottom: 1px solid #ddd;
  gap: 10px;
}

/* 状態 */
.empty-row {
  background: #e8ffe8;
  border-left: 6px solid green;
}

.filled-row {
  background: #e0edff;
  border-left: 6px solid #2563eb;
}

.full-row {
  background: #eaf3ff;
  border-left: 6px solid #3399ff;
}

/* 再生中 */
.playing {
  outline: 3px solid #60a5fa;
}

/* 番号 */
.num {
  width: 70px;
  font-weight: bold;
  font-size: 20px;
}

/* ラベル */
.label {
  flex: 1;
  margin-left: 20px;
}

.empty-label {
  color: green;
  font-weight: bold;
}

/* アイコン */
.icon-btn {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid #ccc;
  border-radius: 6px;
  cursor: pointer;
}

.audio-btn { background: #e0f2fe; }

/* ボタン */
.edit-btn {
  padding: 10px;
  border-radius: 6px;
  border: 2px solid #3b82f6;
  background: #dbeafe;
  cursor: pointer;
}
</style>

</head>
<body>

<h2>訓読チャレンジ予約システム</h2>
<button onclick="exportCSV()">CSV出力</button>
<div id="app"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

// ===== 音声管理 =====
let currentAudio = null;
let currentBtn = null;
let currentRow = null;

// ✅ ページ離脱で強制停止
window.addEventListener("beforeunload", () => {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.src = "";
  }
});

window.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.src = "";
    }
  }
});

// ===== 3桁 =====
function formatSeat(seat){
  return String(seat).padStart(3,"0");
}

// ===== Firebase =====
const firebaseConfig = {
  apiKey: "AIzaSyDvjXQ5xX_jwcHcXnESjjJalCq2xqL2qIw",
  authDomain: "reservation-2026.firebaseapp.com",
  databaseURL: "https://reservation-2026-default-rtdb.firebaseio.com/",
  projectId: "reservation-2026"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== 座席ルール =====
const seatRuleConfig = {
  weekIncrement: 35,
  anchors: [
    { date: "2026-06-14", start: 131, dow: 0 },
    { date: "2026-06-15", start: 136, dow: 1 },
    { date: "2026-06-28", start: 1, dow: 0 },
    { date: "2026-06-29", start: 6, dow: 1 }
  ],
  validUntil: "2026-08-03"
};

// ===== 番号計算 =====
function getSeatStartNumber(dateStr) {

  const date = new Date(dateStr);
  date.setHours(0,0,0,0);

  const dow = date.getDay();

  const anchors = seatRuleConfig.anchors
    .map(a => {
      const d = new Date(a.date);
      d.setHours(0,0,0,0);
      return { ...a, d };
    })
    .filter(a => a.dow === dow && a.d.getTime() <= date.getTime())
    .sort((a,b)=> b.d - a.d);

  if (anchors.length === 0) return null;

  const base = anchors[0];

  const weeks = Math.floor(
    (date.getTime() - base.d.getTime()) / (7*24*60*60*1000)
  );

  return base.start + weeks * seatRuleConfig.weekIncrement;
}

// ===== 日付生成 =====
function generateDates() {

  const result = [];

  const today = new Date();
  today.setHours(0,0,0,0);

  const end = new Date(seatRuleConfig.validUntil);

  for (let d = new Date("2026-01-01"); d <= end; d.setDate(d.getDate()+1)) {

    d.setHours(0,0,0,0);
    if (d < today) continue;

    const day = d.getDay();

    if (day === 0 || day === 1) {
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const dd = String(d.getDate()).padStart(2,"0");
      result.push(`${yyyy}-${mm}-${dd}`);
    }
  }

  return result;
}

const dates = generateDates();
const SEAT_COUNT = 5;

// ===== 描画 =====
function render(data) {

  const app = document.getElementById("app");
  app.innerHTML = "";

  dates.forEach(date => {

    const start = getSeatStartNumber(date);
    if (start === null) return;

    const d = new Date(date);
    const day = d.getDay();

    // ✅ タイトル（赤復元）
    const title = document.createElement("div");
    title.className = "title";

    if (day === 0) {
      title.style.color = "red";
      title.style.background = "#ffeaea";
    } else {
      title.style.color = "black";
      title.style.background = "#f0f0f0";
    }

    title.textContent = `■ 読み手（${date} ${day === 0 ? "日" : "月"}）`;
    app.appendChild(title);

    // ✅ 残席
    let used = 0;
    for (let i=0;i<SEAT_COUNT;i++) {
      if (data?.[date]?.[start+i]) used++;
    }

    const remain = SEAT_COUNT - used;

    const remainDiv = document.createElement("div");

    if (remain === 0) {
      remainDiv.innerHTML = `<b style="color:#3399ff;">🔵 満席</b>`;
    } else {
      remainDiv.innerHTML = `<b style="color:green;">🟢 空き：あと${remain}席</b>`;
    }

    app.appendChild(remainDiv);

    // ✅ 席表示
    for (let i=0;i<SEAT_COUNT;i++) {

      const seat = start+i;
      const name = data?.[date]?.[seat] || "";

      const row = document.createElement("div");
      row.className = "row";

      if (!name) row.classList.add("empty-row");
      else row.classList.add("filled-row");

      if (remain === 0) row.classList.add("full-row");

      const num = document.createElement("div");
      num.className = "num";
      num.textContent = seat;

      // 🎧 音声
      const btn = document.createElement("button");
      btn.className = "icon-btn audio-btn";
      btn.textContent = "🔊";

      btn.onclick = () => {

        const id = formatSeat(seat);

        // 同じなら停止
        if (currentBtn === btn) {
          currentAudio.pause();
          currentAudio.src="";
          btn.textContent="🔊";
          if (currentRow) currentRow.classList.remove("playing");
          currentAudio=null;
          currentBtn=null;
          currentRow=null;
          return;
        }

        // 前の音停止
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.src="";
        }

        if (currentBtn) currentBtn.textContent="🔊";
        if (currentRow) currentRow.classList.remove("playing");

        const audio = new Audio();

        const list = [
          `audio/${id}.m4a`,
          `audio/${id}.aac`
        ];

        let idx = 0;

        const play = () => {
          if (idx >= list.length) {
            alert("音声なし:" + id);
            return;
          }
          audio.src = list[idx];
          audio.play().catch(()=>{
            idx++;
            play();
          });
        };

        audio.onended = () => {
          btn.textContent="🔊";
          if (currentRow) currentRow.classList.remove("playing");
          currentAudio=null;
          currentBtn=null;
          currentRow=null;
        };

        play();

        btn.textContent="⏸";
        row.classList.add("playing");

        currentAudio=audio;
        currentBtn=btn;
        currentRow=row;
      };

      const label = document.createElement("div");
      label.className = "label";

      label.innerHTML = name
        ? `<b>${name}</b>`
        : `<span class="empty-label">🟢 空き</span>`;

      const edit = document.createElement("button");
      edit.className = "edit-btn";
      edit.textContent = name ? "編集" : "予約";

      edit.onclick = () => {
        const input = prompt("名前入力", name);
        if (input === null) return;

        const ref = db.ref(`reservations/${date}/${seat}`);

        if (input.trim() === "") ref.remove();
        else ref.set(input.trim());
      };

      row.appendChild(num);
      row.appendChild(btn);
      row.appendChild(label);
      row.appendChild(edit);

      app.appendChild(row);
    }
  });
}

// ===== リアルタイム =====
db.ref("reservations").on("value", snap=>{
  render(snap.val());
});

// ===== CSV =====
function exportCSV(){
  db.ref("reservations").once("value", snap=>{
    let csv="日付,席番号,名前\n";
    const data=snap.val()||{};
    Object.entries(data).forEach(([d,v])=>{
      Object.entries(v).forEach(([s,n])=>{
        csv+=`${d},${s},${n}\n`;
      });
    });

    const blob=new Blob([csv]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="reservations.csv";
    a.click();
  });
}

</script>
</body>
</html>
