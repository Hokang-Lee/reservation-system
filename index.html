<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約システム</title>

<style>
html, body { height:100%; }

body{
  font-family:"Segoe UI","Noto Sans JP",sans-serif;
  margin:0;
  display:flex;
  height:100vh;
  background:#f5f7fb;
}

h1{
  width:200px;
  margin:0;
  background:linear-gradient(180deg,#2563eb,#1e40af);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.4;
}

#app{
  flex:1;
  overflow-y:auto;
  padding:24px;
}

.title{
  font-weight:bold;
  padding:12px 16px;
  margin-top:28px;
  border-radius:10px;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.remain{ margin:6px 0 10px; }

.row{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-radius:10px;
  margin-bottom:8px;
  background:white;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}

.row:hover{ transform:translateY(-2px); }

.row-top{
  display:flex;
  gap:8px;
  width:110px;
}

.seat{ width:55px; font-weight:bold; }
.play{ width:45px; }

.label{ flex:1; }
.edit{ width:70px; }

.empty-row{ border-left:6px solid #22c55e; }
.filled-row{ border-left:6px solid #2563eb; }
.playing{ outline:3px solid #f59e0b; }

button{
  border:none;
  background:#e5e7eb;
  padding:6px 10px;
  border-radius:8px;
}

#viewer{
  width:40%;
  height:100%;
  background:#111;
  position:relative;
}

#pdfViewer{ width:100%; height:100%; }

#closePdf{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:white;
}

/* スマホ */
@media(max-width:768px){

  #viewer{ display:none; }

  h1{ width:110px; font-size:14px; }

  .row{
    flex-direction:column;
    align-items:stretch;
    gap:6px;
  }

  .row-top{ width:auto; }

  .edit{
    align-self:flex-end;
    width:auto;
  }
}
</style>
</head>

<body>

<h1>予習機能付き<br>訓読予約</h1>

<div id="app"></div>

<div id="viewer">
  <button id="closePdf">✖</button>
  <iframe id="pdfViewer"></iframe>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyDvjXQ5xX_jwcHcXnESjjJalCq2xqL2qIw",
  authDomain:"reservation-2026.firebaseapp.com",
  databaseURL:"https://reservation-2026-default-rtdb.firebaseio.com/",
  projectId:"reservation-2026"
});
const db = firebase.database();

let viewerAudio=new Audio();
let currentDocId=null;
let currentRow=null;
let currentBtn=null;
let isAudioPlaying=false;

// ✅ 完全停止
function stopAudio(){
  viewerAudio.pause();
  viewerAudio.currentTime=0;

  // ★これが最重要
  viewerAudio.src="";
  viewerAudio.load();

  isAudioPlaying=false;

  if(currentBtn){
    currentBtn.textContent="▶";
    currentBtn=null;
  }

  currentDocId=null;

  if(currentRow){
    currentRow.classList.remove("playing");
    currentRow=null;
  }
}

// ✅ 再生監視
viewerAudio.onplay=()=>{
  isAudioPlaying=true;
  if(currentBtn) currentBtn.textContent="⏸";
};

viewerAudio.onpause=()=>{
  isAudioPlaying=false;
  if(currentBtn) currentBtn.textContent="▶";
};

viewerAudio.onended=stopAudio;

// ✅ 状態同期（ここが核心）
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible"){
    if(!viewerAudio.paused){
      isAudioPlaying=true;
      if(currentBtn) currentBtn.textContent="⏸";
    }
  }
});

// 補助
window.addEventListener("blur",()=>{});

// ===== 音声
async function loadAndPlayAudio(id,row){
  const formats=["m4a","aac"];

  for(const ext of formats){
    const url=`audio/${id}.${ext}`;
    try{
      await new Promise((res,rej)=>{
        const a=new Audio(url);
        a.oncanplaythrough=res;
        a.onerror=rej;
      });

      viewerAudio.src=url;
      await viewerAudio.play();

      if(currentRow) currentRow.classList.remove("playing");
      row.classList.add("playing");
      currentRow=row;

      return;
    }catch{}
  }
  throw new Error("音声なし");
}

function formatSeat(s){return String(s).padStart(3,"0");}

const config={
  weekIncrement:35,
  anchors:[
    {date:"2026-06-14",start:131,dow:0},
    {date:"2026-06-15",start:136,dow:1},
    {date:"2026-06-28",start:1,dow:0},
    {date:"2026-06-29",start:6,dow:1}
  ],
  validUntil:"2026-08-03"
};

function getStart(dateStr){
  const date=new Date(dateStr);
  date.setHours(0,0,0,0);
  const dow=date.getDay();

  const list=config.anchors.map(a=>{
    const d=new Date(a.date);
    d.setHours(0,0,0,0);
    return {...a,d};
  }).filter(a=>a.dow===dow && a.d<=date)
    .sort((a,b)=>b.d-a.d);

  if(!list.length) return null;

  const base=list[0];
  const weeks=Math.floor((date-base.d)/(7*24*60*60*1000));
  return base.start + weeks*config.weekIncrement;
}

function generateDates(){
  const result=[];
  const today=new Date();
  today.setHours(0,0,0,0);
  const end=new Date(config.validUntil);

  for(let d=new Date("2026-01-01");d<=end;d.setDate(d.getDate()+1)){
    d.setHours(0,0,0,0);
    if(d<today) continue;
    const day=d.getDay();
    if(day===0||day===1){
      result.push(d.toISOString().slice(0,10));
    }
  }
  return result;
}

const dates=generateDates();
const SEAT=5;

function render(data){
  const app=document.getElementById("app");
  app.innerHTML="";

  dates.forEach(date=>{
    const start=getStart(date);
    if(start===null) return;

    const d=new Date(date);
    const day=d.getDay();

    const title=document.createElement("div");
    title.className="title";
    title.innerHTML=`■ 読み手（${date} ${day===0?"日":"月"}）`;

    if(day===0){
      title.style.color="red";
      title.style.background="#ffeaea";
    }

    app.appendChild(title);

    for(let i=0;i<SEAT;i++){
      const seat=start+i;
      const id=formatSeat(seat);
      const name=data?.[date]?.[seat]||"";

      const row=document.createElement("div");
      row.className="row";
      row.classList.add(name?"filled-row":"empty-row");

      const top=document.createElement("div");
      top.className="row-top";

      const num=document.createElement("div");
      num.className="seat";
      num.textContent=seat;

      const btn=document.createElement("button");
      btn.className="play";
      btn.textContent="▶";

      btn.onclick=async()=>{
        if(currentDocId===id && isAudioPlaying){
          stopAudio();
          return;
        }

        stopAudio();

        currentDocId=id;
        currentBtn=btn;
        btn.textContent="⏸";

        document.getElementById("pdfViewer").src=`docs/${id}.pdf#zoom=page-width`;

        try{ await loadAndPlayAudio(id,row); }
        catch{ stopAudio(); }
      };

      top.appendChild(num);
      top.appendChild(btn);

      const label=document.createElement("div");
      label.className="label";
      label.innerHTML=name||"空き";

      const edit=document.createElement("button");
      edit.className="edit";
      edit.textContent=name?"編集":"予約";

      row.appendChild(top);
      row.appendChild(label);
      row.appendChild(edit);

      app.appendChild(row);
    }
  });
}

document.getElementById("closePdf").onclick=()=>{
  document.getElementById("pdfViewer").src="";
  stopAudio();
};

db.ref("reservations").on("value",snap=>{
  render(snap.val());
});
</script>

</body>
</html>
