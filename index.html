<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約システム</title>

<style>
body {
  font-family: sans-serif;
  max-width: 700px;
  margin: 20px auto;
  font-size: 18px;
}

/* タイトル */
.title {
  font-weight: bold;
  margin-top: 20px;
  padding: 10px;
  font-size: 22px;
}

/* 行 */
.row {
  display: flex;
  align-items: center;
  padding: 12px;
  border-bottom: 1px solid #ddd;
  gap: 10px;
}

/* 空き */
.empty-row {
  background-color: #e8ffe8;
  border-left: 6px solid green;
}

/* 入力済み */
.filled-row {
  background-color: #e0edff;
  border-left: 6px solid #2563eb;
}

/* 満席 */
.full-row {
  background-color: #eaf3ff;
  border-left: 6px solid #3399ff;
}

/* 番号 */
.num {
  width: 70px;
  font-weight: bold;
  font-size: 20px;
}

/* ラベル */
.label {
  flex: 1;
  margin-left: 20px;
  font-size: 20px;
}

/* 空き */
.empty-label {
  color: green;
  font-weight: bold;
}

/* アイコン */
.icon-btn {
  width: 44px;
  height: 44px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 20px;
  border-radius: 6px;
  cursor: pointer;
  border: 2px solid #ccc;
}

/* 文書（今回は未使用でもOK） */
.doc-btn {
  background: #f3e8ff;
  border-color: #c084fc;
}

/* 音声 */
.audio-btn {
  background: #e0f2fe;
  border-color: #38bdf8;
}

.icon-btn:hover {
  background: #eee;
}

/* 編集ボタン（青統一） */
.edit-btn {
  padding: 10px 14px;
  font-size: 14px;
  border-radius: 6px;
  cursor: pointer;

  background-color: #dbeafe;
  border: 2px solid #3b82f6;
  color: #1d4ed8;
}

/* スマホ */
@media (max-width: 600px) {

  body { font-size: 20px; }

  .row {
    flex-direction: column;
    align-items: stretch;
  }

  .label {
    font-size: 22px;
  }

  button, .icon-btn {
    width: 100%;
    font-size: 18px;
  }
}
</style>

</head>
<body>

<h2>訓読チャレンジ予約システム</h2>
<button onclick="exportCSV()">CSV出力</button>

<div id="app"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

// ✅ 音声制御
let currentAudio = null;

// ✅ 3桁変換
function formatSeatNumber(seat) {
  return String(seat).padStart(3, "0");
}


// Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyDvjXQ5xX_jwcHcXnESjjJalCq2xqL2qIw",
  authDomain: "reservation-2026.firebaseapp.com",
  databaseURL: "https://reservation-2026-default-rtdb.firebaseio.com/",
  projectId: "reservation-2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// ルール
const seatRuleConfig = {
  weekIncrement: 35,
  anchors: [
    { date: "2026-06-14", start: 131, dow: 0 },
    { date: "2026-06-15", start: 136, dow: 1 },
    { date: "2026-06-28", start: 1, dow: 0 },
    { date: "2026-06-29", start: 6, dow: 1 }
  ],
  validUntil: "2026-08-03"
};


// 開始番号
function getSeatStartNumber(dateStr) {
  const date = new Date(dateStr);
  const dow = date.getDay();

  const anchors = seatRuleConfig.anchors
    .map(a => ({ ...a, d: new Date(a.date) }))
    .filter(a => a.d <= date && a.dow === dow)
    .sort((a, b) => b.d - a.d);

  if (anchors.length === 0) return null;

  const base = anchors[0];
  const weeks = Math.floor((date - base.d) / (7*24*60*60*1000));

  return base.start + weeks * seatRuleConfig.weekIncrement;
}


// 日付生成
function generateDates() {
  const result = [];

  const today = new Date();
  today.setHours(0,0,0,0);

  const end = new Date(seatRuleConfig.validUntil);
  end.setHours(23,59,59,999);

  for (let d = new Date("2026-01-01"); d <= end; d.setDate(d.getDate()+1)) {

    d.setHours(0,0,0,0);
    if (d < today) continue;

    const day = d.getDay();
    if (day === 0 || day === 1) {
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const dd = String(d.getDate()).padStart(2,"0");

      result.push(`${yyyy}-${mm}-${dd}`);
    }
  }

  return result;
}

const dates = generateDates();
const SEAT_COUNT = 5;


// 描画
function render(data) {

  const app = document.getElementById("app");
  app.innerHTML = "";

  dates.forEach(date => {

    const start = getSeatStartNumber(date);
    if (start === null) return;

    const d = new Date(date);
    const day = d.getDay();
    const dayText = (day === 0) ? "日" : "月";

    const title = document.createElement("div");

    if (day === 0) {
      title.style.color = "red";
      title.style.background = "#ffeaea";
    } else {
      title.style.color = "black";
      title.style.background = "#f0f0f0";
    }

    title.className = "title";
    title.textContent = `■ 読み手（${date} ${dayText}）`;
    app.appendChild(title);

    // 残数
    let used = 0;
    for (let i = 0; i < SEAT_COUNT; i++) {
      const seat = start + i;
      if (data?.[date]?.[seat]) used++;
    }

    const remain = SEAT_COUNT - used;

    const remainDiv = document.createElement("div");

    if (remain === 0) {
      remainDiv.innerHTML = `<b style="color:#3399ff;">🔵 満席</b>`;
    } else {
      remainDiv.innerHTML = `<b style="color:green;">🟢 空き：あと${remain}席</b>`;
    }

    app.appendChild(remainDiv);


    for (let i=0; i<SEAT_COUNT; i++) {

      const seat = start + i;
      const name = data?.[date]?.[seat] || "";

      const row = document.createElement("div");
      row.className = "row";

      if (!name) row.classList.add("empty-row");
      else row.classList.add("filled-row");

      if (remain === 0) row.classList.add("full-row");

      // 番号
      const num = document.createElement("div");
      num.className = "num";
      num.textContent = seat;

      // 文書（まだ未使用OK）
      const docBtn = document.createElement("button");
      docBtn.textContent = "📄";
      docBtn.className = "icon-btn doc-btn";

      // ✅ 音声（3桁 + m4a→aac）
      const audioBtn = document.createElement("button");
      audioBtn.textContent = "🔊";
      audioBtn.className = "icon-btn audio-btn";

      audioBtn.onclick = () => {

        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
        }

        const id = formatSeatNumber(seat);

        let audio = new Audio(`audio/${id}.m4a`);

        audio.onerror = () => {
          audio = new Audio(`audio/${id}.aac`);
          audio.play();
        };

        audio.play();
        currentAudio = audio;
      };

      // 名前
      const label = document.createElement("div");
      label.className = "label";

      if (!name) {
        label.innerHTML = `<span class="empty-label">🟢 空き</span>`;
      } else {
        label.innerHTML = `<b>${name}</b>`;
      }

      // ボタン
      const editBtn = document.createElement("button");
      editBtn.className = "edit-btn";

      editBtn.textContent = (!name) ? "予約" : "編集";

      editBtn.onclick = () => {
        const input = prompt("名前入力（空欄で削除）", name);
        if (input === null) return;

        const ref = db.ref(`reservations/${date}/${seat}`);

        if (input.trim() === "") {
          ref.remove();
        } else {
          ref.set(input.trim());
        }
      };

      row.appendChild(num);
      row.appendChild(docBtn);
      row.appendChild(audioBtn);
      row.appendChild(label);
      row.appendChild(editBtn);

      app.appendChild(row);
    }

  });
}


// リアルタイム
db.ref("reservations").on("value", snap => {
  render(snap.val());
});


// CSV
function exportCSV() {
  db.ref("reservations").once("value", snap => {

    let csv = "日付,席番号,名前\n";
    const data = snap.val() || {};

    Object.entries(data).forEach(([date, seats]) => {
      Object.entries(seats).forEach(([seat, name]) => {
        csv += `${date},${seat},${name}\n`;
      });
    });

    const blob = new Blob([csv], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "reservations.csv";
    a.click();
  });
}

</script>

</body>
</html>
