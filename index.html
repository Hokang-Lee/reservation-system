<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約システム</title>

<style>
html, body { height:100%; }

body{
  font-family:"Segoe UI","Noto Sans JP",sans-serif;
  margin:0;
  display:flex;
  height:100vh;
  background:#f5f7fb;
}

/* 左サイド */
h1{
  width:200px;
  margin:0;
  background:linear-gradient(180deg,#2563eb,#1e40af);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.4;
}

/* メイン */
#app{
  flex:1;
  overflow-y:auto;
  padding:24px;
}

/* タイトルカード */
.title{
  font-weight:bold;
  padding:12px 16px;
  margin-top:28px;
  border-radius:10px;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* 残席 */
.remain{
  margin:6px 0 10px;
}

/* 行カード */
.row{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-radius:10px;
  margin-bottom:8px;
  background:white;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
  transition:.2s;
}

.row:hover{
  transform:translateY(-2px);
}

/* ✅ row-top */
.row-top{
  display:flex;
  align-items:center;
  gap:8px;
  width:110px;
}

.row-top .seat{
  width:55px;
  font-weight:bold;
}

.row-top .play{
  width:45px;
  text-align:center;
}

/* ✅ label / edit */
.label{
  flex:1;
  font-size:15px;
}

.edit{
  width:70px;
  text-align:center;
}

/* 状態 */
.empty-row{ border-left:6px solid #22c55e; }
.filled-row{ border-left:6px solid #2563eb; }

.playing{
  outline:3px solid #f59e0b;
  background:#fff7ed;
}

/* ボタン */
button{
  border:none;
  background:#e5e7eb;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  transition:.2s;
}
button:hover{
  background:#d1d5db;
}

/* PDF */
#viewer{
  width:40%;
  height:100%;
  min-height:0;
  background:#111;
  position:relative;
}

#pdfViewer{
  width:100%;
  height:100%;
  border:none;
}

/* 閉じる */
#closePdf{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:white;
}

/* ✅ モバイル完全対応 */
@media (max-width:768px){

  #viewer{ display:none; }

  h1{
    width:110px;
    font-size:14px;
  }

  .row{
    flex-direction:column;
    align-items:stretch;
    gap:6px;
  }

  /* 上段 */
  .row-top{
    width:auto;
  }

  /* 名前 */
  .label{
    width:100%;
    font-size:16px;
    font-weight:500;
    word-break: break-word;
  }

  /* 編集 */
  .edit{
    width:auto;
    align-self:flex-end;
  }

}
</style>
</head>

<body>

<h1>
予習機能付き<br>
訓読予約
</h1>

<div id="app"></div>

<div id="viewer">
  <button id="closePdf">✖</button>
  <iframe id="pdfViewer"></iframe>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// ===== Firebase =====
firebase.initializeApp({
  apiKey:"AIzaSyDvjXQ5xX_jwcHcXnESjjJalCq2xqL2qIw",
  authDomain:"reservation-2026.firebaseapp.com",
  databaseURL:"https://reservation-2026-default-rtdb.firebaseio.com/",
  projectId:"reservation-2026"
})
const db = firebase.database();

// ===== 状態 =====
let viewerAudio = null;
let currentDocId=null;
let currentRow=null;
let currentBtn=null;
let isAudioPlaying=false;

// ===== 停止 =====
function stopAudio(){

  if(viewerAudio){
    viewerAudio.pause();
    viewerAudio.src = "";
    viewerAudio.load();
    viewerAudio = null;
  }

  if(currentBtn){
    currentBtn.textContent = "▶";
    currentBtn = null;
  }

  if(currentRow){
    currentRow.classList.remove("playing");
    currentRow = null;
  }

  currentDocId = null;
}

// ===== 音声 =====
async function loadAndPlayAudio(id, row){

  const formats = ["m4a","aac"];

  for(const ext of formats){

    const url = `audio/${id}.${ext}`;

    try{

      // ✅ Audioは1回だけ生成
      const audio = new Audio(url);

      await new Promise((resolve, reject)=>{
        audio.oncanplaythrough = resolve;
        audio.onerror = reject;
      });

      // ✅ 成功時だけ代入
      viewerAudio = audio;

      // ✅ currentBtnが既に外でセットされている前提
      audio.onplay = ()=>{
        if(currentBtn) currentBtn.textContent = "⏸";
      };

      audio.onpause = ()=>{
        if(currentBtn) currentBtn.textContent = "▶";
      };

      audio.onended = stopAudio;

      await audio.play();

      if(currentRow) currentRow.classList.remove("playing");
      row.classList.add("playing");

      currentRow = row;

      return;

    }catch{}
  }

  throw new Error("音声なし");
}

// ===== ユーティリティ =====
function formatSeat(s){return String(s).padStart(3,"0");}

// ===== 設定 =====
const config={
  weekIncrement:35,
  anchors:[
    {date:"2026-06-14",start:131,dow:0},
    {date:"2026-06-15",start:136,dow:1},
    {date:"2026-06-28",start:1,dow:0},
    {date:"2026-06-29",start:6,dow:1}
  ],
  validUntil:"2026-08-03"
};

function getStart(dateStr){
  const date=new Date(dateStr);
  date.setHours(0,0,0,0);
  const dow=date.getDay();

  const list=config.anchors
    .map(a=>{
      const d=new Date(a.date);
      d.setHours(0,0,0,0);
      return {...a,d};
    })
    .filter(a=>a.dow===dow && a.d<=date)
    .sort((a,b)=>b.d-a.d);

  if(!list.length) return null;

  const base=list[0];
  const weeks=Math.floor((date-base.d)/(7*24*60*60*1000));
  return base.start + weeks*config.weekIncrement;
}

function generateDates(){
  const result=[];
  const today=new Date();
  today.setHours(0,0,0,0);
  const end=new Date(config.validUntil);

  for(let d=new Date("2026-01-01");d<=end;d.setDate(d.getDate()+1)){
    d.setHours(0,0,0,0);
    if(d<today) continue;
    const day=d.getDay();
    if(day===0||day===1){
      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,"0");
      const da=String(d.getDate()).padStart(2,"0");
      result.push(`${y}-${m}-${da}`);
    }
  }
  return result;
}

const dates=generateDates();
const SEAT=5;

// ===== 描画 =====
function render(data){
  const app=document.getElementById("app");
  app.innerHTML="";

  dates.forEach(date=>{
    const start=getStart(date);
    if(start===null) return;

    const d=new Date(date);
    const day=d.getDay();

    const title=document.createElement("div");
    title.className="title";
    title.innerHTML=`■ 読み手（${date} ${day===0?"日":"月"}）`;

    if(day===0){
      title.style.color="red";
      title.style.background="#ffeaea";
    }else{
      title.style.background="#f0f0f0";
    }
    app.appendChild(title);

    let used=0;
    for(let i=0;i<SEAT;i++){
      if(data?.[date]?.[start+i]) used++;
    }

    const remain=SEAT-used;
    const remainDiv=document.createElement("div");
    remainDiv.className="remain";
    remainDiv.innerHTML=
      remain===0
      ? "<b style='color:#3399ff;'>🔵 満席</b>"
      : `<b style='color:green;'>🟢 空き：あと${remain}席</b>`;
    app.appendChild(remainDiv);

    for(let i=0;i<SEAT;i++){
      const seat=start+i;
      const id=formatSeat(seat);
      const name=data?.[date]?.[seat]||"";

      const row=document.createElement("div");
      row.className="row";
      row.classList.add(name?"filled-row":"empty-row");

      // ✅ row-top
      const top=document.createElement("div");
      top.className="row-top";

      const num=document.createElement("div");
      num.className="seat";
      num.textContent=seat;

      const btn=document.createElement("button");
      btn.className="play";
      btn.textContent="▶";

      btn.onclick = async ()=>{

        // ✅ トグル成立条件
        if(currentDocId === id && viewerAudio && !viewerAudio.paused){
          stopAudio();
          return;
        }

        stopAudio();

        currentBtn = btn;   // ✅ ここ重要（入れてないとUIズレる）

        // ✅ 先にPDF表示（重要）
        document.getElementById("pdfViewer").src = `docs/${id}.pdf`;

        try{
          await loadAndPlayAudio(id, row);
          currentDocId = id;
        }catch{
          // ✅ 音声が無くても無視（ここポイント）
          console.log("音声なしでも続行");
        }
      };


      top.appendChild(num);
      top.appendChild(btn);

      const label=document.createElement("div");
      label.className="label";
      label.innerHTML=name?`<b>${name}</b>`:"空き";

      const edit=document.createElement("button");
      edit.className="edit";
      edit.textContent=name?"編集":"予約";
      edit.onclick=()=>{
        const input=prompt("名前入力",name);
        if(input===null) return;
        const ref=db.ref(`reservations/${date}/${seat}`);
        input.trim()===""?ref.remove():ref.set(input.trim());
      };

      row.appendChild(top);
      row.appendChild(label);
      row.appendChild(edit);

      app.appendChild(row);
    }
  });
}

// ===== 閉じる =====
document.getElementById("closePdf").onclick=()=>{
  document.getElementById("pdfViewer").src="";
  stopAudio();
};

// ===== 起動 =====
db.ref("reservations").on("value",snap=>{
  render(snap.val());
});

// ===== 離脱停止（ここに追加） =====

document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="hidden"){
    stopAudio();
  }
});

window.addEventListener("pagehide", stopAudio);
window.addEventListener("blur", stopAudio);
window.addEventListener("beforeunload", stopAudio);


</script>

</body>
</html>
