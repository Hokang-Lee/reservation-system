<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約システム</title>

<style>
body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; }

h1 {
  width: 200px;
  margin: 0;
  background: #2563eb;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  line-height: 1.3;
}

#app { flex: 1; overflow-y: auto; padding: 20px; }
#viewer { width: 40%; background: #222; }

#pdfViewer {
  width: 100%;
  height: 100%;
  border: none;
}

.title {
  font-weight: bold;
  padding: 10px;
  margin-top: 20px;
}

.row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.empty-row { background: #e8ffe8; border-left: 6px solid green; }
.filled-row { background: #e0edff; border-left: 6px solid #2563eb; }

.playing {
  background: #fff7ed !important;
  outline: 3px solid #f59e0b;
}

.label { flex: 1; }

@media (max-width: 768px) {
  body { flex-direction: row; }
  h1 { width: 110px; font-size: 14px; }
  #viewer { display: none; }
}
</style>
</head>

<body>

<h1>
  予習機能付き<br>
  訓読予約システム
</h1>

<div id="app"></div>

<div id="viewer">
  <iframe id="pdfViewer"></iframe>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

// ===== Firebase =====
firebase.initializeApp({
  apiKey:"AIzaSyDvjXQ5xX_jwcHcXnESjjJalCq2xqL2qIw",
  authDomain:"reservation-2026.firebaseapp.com",
  databaseURL:"https://reservation-2026-default-rtdb.firebaseio.com/",
  projectId:"reservation-2026"
});
const db = firebase.database();

// ===== 状態 =====
let viewerAudio = null;
let currentRow = null;

// ===== 停止 =====
function stopAudio(){
  if(viewerAudio){
    viewerAudio.pause();
    viewerAudio.src = "";
    viewerAudio = null;
  }
  if(currentRow){
    currentRow.classList.remove("playing");
    currentRow = null;
  }
}

// ✅ 離脱対策
window.addEventListener("beforeunload", stopAudio);
window.addEventListener("pagehide", stopAudio);
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState==="hidden"){
    stopAudio();
  }
});

// ===== 3桁 =====
function formatSeat(seat){
  return String(seat).padStart(3,"0");
}

// ===== 座席 =====
const config = {
  weekIncrement: 35,
  anchors: [
    { date: "2026-06-14", start: 131, dow: 0 },
    { date: "2026-06-15", start: 136, dow: 1 },
    { date: "2026-06-28", start: 1, dow: 0 },
    { date: "2026-06-29", start: 6, dow: 1 }
  ],
  validUntil: "2026-08-03"
};

function getStart(dateStr){
  const date = new Date(dateStr);
  date.setHours(0,0,0,0);
  const dow = date.getDay();

  const list = config.anchors
    .map(a=>{
      const d=new Date(a.date);
      d.setHours(0,0,0,0);
      return {...a,d};
    })
    .filter(a=>a.dow===dow && a.d<=date)
    .sort((a,b)=>b.d-a.d);

  if(list.length===0) return null;

  const base = list[0];
  const weeks = Math.floor((date-base.d)/(7*24*60*60*1000));
  return base.start + weeks*config.weekIncrement;
}

function generateDates(){

  const res=[];
  const today=new Date();
  today.setHours(0,0,0,0);

  const end=new Date(config.validUntil);

  for(let d=new Date("2026-01-01"); d<=end; d.setDate(d.getDate()+1)){

    d.setHours(0,0,0,0);
    if(d<today) continue;

    const day=d.getDay();

    if(day===0||day===1){

      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,"0");
      const da=String(d.getDate()).padStart(2,"0");

      // ✅ これにする
      const dateStr = `${y}-${m}-${da}`;

      res.push(dateStr);
    }
  }

  return res;
}

const dates = generateDates();
const SEAT = 5;

// ===== 描画 =====
function render(data){

  const app=document.getElementById("app");
  app.innerHTML="";

  dates.forEach(date=>{

    const start=getStart(date);
    if(start===null) return;

    const day=new Date(date).getDay();

    const title=document.createElement("div");
    title.className="title";
    title.innerHTML=`■ 読み手（${date} ${day===0?"日":"月"}）`;

    if(day===0){
      title.style.color="red";
      title.style.background="#ffeaea";
    }else{
      title.style.background="#f0f0f0";
    }

    app.appendChild(title);

    let used=0;
    for(let i=0;i<SEAT;i++){
      const seat=start+i;
      if(data?.[date]?.[seat]) used++;
    }

    const remain=SEAT-used;

    const remainDiv=document.createElement("div");
    remainDiv.innerHTML =
      remain===0
      ? `<b style="color:#3399ff;">🔵 満席</b>`
      : `<b style="color:green;">🟢 空き：あと${remain}席</b>`;

    app.appendChild(remainDiv);

    for(let i=0;i<SEAT;i++){

      const seat=start+i;
      const name=data?.[date]?.[seat]||"";

      const row=document.createElement("div");
      row.className="row";
      row.classList.add(name?"filled-row":"empty-row");

      const num=document.createElement("div");
      num.textContent=seat;

      const btn=document.createElement("button");
      btn.textContent="📄";

      const id=formatSeat(seat);

      btn.onclick = () => {

        // ✅ 割り込み再生
        stopAudio();

        viewerAudio = new Audio();

        // ✅ AAC一本化（最重要）
        viewerAudio.src = `audio/${id}.aac`;

        // ✅ playは1回だけ
        const p = viewerAudio.play();
        if(p){
          p.catch(err => {
            console.log("再生失敗", err);
          });
        }

        // ✅ PDF
        document.getElementById("pdfViewer").src =
          `docs/${id}.pdf#zoom=page-width`;

        // ✅ UI
        if(currentRow) currentRow.classList.remove("playing");
        row.classList.add("playing");
        currentRow = row;
      };

      const label=document.createElement("div");
      label.className="label";
      label.innerHTML=name?`<b>${name}</b>`:"空き";

      const edit=document.createElement("button");
      edit.textContent=name?"編集":"予約";

      edit.onclick=()=>{
        const input=prompt("名前入力",name);
        if(input===null)return;

        const ref=db.ref(`reservations/${date}/${seat}`);
        input.trim()==="" ? ref.remove() : ref.set(input.trim());
      };

      row.appendChild(num);
      row.appendChild(btn);
      row.appendChild(label);
      row.appendChild(edit);

      app.appendChild(row);
    }

  });
}

db.ref("reservations").on("value",snap=>{
  render(snap.val());
});

</script>
</body>
</html>
