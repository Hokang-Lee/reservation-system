<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約システム</title>

<style>
body {
  font-family: sans-serif;
  max-width: 700px;
  margin: 20px auto;
  font-size: 18px;
}

.title {
  font-weight: bold;
  margin-top: 20px;
  padding: 10px;
  font-size: 22px;
}

.row {
  display: flex;
  align-items: center;
  padding: 12px;
  border-bottom: 1px solid #ddd;
  gap: 10px;
}

/* 状態 */
.empty-row {
  background-color: #e8ffe8;
  border-left: 6px solid green;
}

.filled-row {
  background-color: #e0edff;
  border-left: 6px solid #2563eb;
}

.full-row {
  background-color: #eaf3ff;
  border-left: 6px solid #3399ff;
}

/* ✅ 再生中 */
.playing {
  outline: 3px solid #60a5fa;
}

/* 番号 */
.num {
  width: 70px;
  font-weight: bold;
  font-size: 20px;
}

/* ラベル */
.label {
  flex: 1;
  margin-left: 20px;
  font-size: 20px;
}

.empty-label {
  color: green;
  font-weight: bold;
}

/* アイコン */
.icon-btn {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  border-radius: 6px;
  cursor: pointer;
  border: 2px solid #ccc;
}

.doc-btn {
  background: #f3e8ff;
  border-color: #c084fc;
}

.audio-btn {
  background: #e0f2fe;
  border-color: #38bdf8;
}

.icon-btn:hover {
  background: #eee;
}

/* ボタン */
.edit-btn {
  padding: 10px 14px;
  font-size: 14px;
  border-radius: 6px;
  cursor: pointer;
  background-color: #dbeafe;
  border: 2px solid #3b82f6;
  color: #1d4ed8;
}
</style>

</head>

<body>

<h2>訓読チャレンジ予約システム</h2>
<button onclick="exportCSV()">CSV出力</button>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

// ✅ 音声管理（完全排他）
let currentAudio = null;
let currentAudioBtn = null;
let currentRow = null;

// ✅ 3桁化
function formatSeatNumber(seat) {
  return String(seat).padStart(3, "0");
}

// ✅ Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyDvjXQ5xX_jwcHcXnESjjJalCq2xqL2qIw",
  authDomain: "reservation-2026.firebaseapp.com",
  databaseURL: "https://reservation-2026-default-rtdb.firebaseio.com/",
  projectId: "reservation-2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ✅ 座席ルール
const seatRuleConfig = {
  weekIncrement: 35,
  anchors: [
    { date: "2026-06-14", start: 131, dow: 0 },
    { date: "2026-06-15", start: 136, dow: 1 },
    { date: "2026-06-28", start: 1, dow: 0 },
    { date: "2026-06-29", start: 6, dow: 1 }
  ],
  validUntil: "2026-08-03"
};

// ✅ 開始番号
function getSeatStartNumber(dateStr) {
  const date = new Date(dateStr);
  const dow = date.getDay();

  const anchors = seatRuleConfig.anchors
    .map(a => ({ ...a, d: new Date(a.date) }))
    .filter(a => a.d <= date && a.dow === dow)
    .sort((a, b) => b.d - a.d);

  if (anchors.length === 0) return null;

  const base = anchors[0];
  const weeks = Math.floor((date - base.d)/(7*24*60*60*1000));

  return base.start + weeks * seatRuleConfig.weekIncrement;
}

// ✅ 日付生成
function generateDates() {
  const result = [];
  const today = new Date();
  today.setHours(0,0,0,0);

  const end = new Date(seatRuleConfig.validUntil);

  for (let d=new Date("2026-01-01"); d<=end; d.setDate(d.getDate()+1)) {
    d.setHours(0,0,0,0);
    if (d < today) continue;

    const day = d.getDay();
    if (day === 0 || day === 1) {
      result.push(d.toISOString().slice(0,10));
    }
  }

  return result;
}

const dates = generateDates();
const SEAT_COUNT = 5;


// ✅ 描画
function render(data) {

  const app = document.getElementById("app");
  app.innerHTML = "";

  dates.forEach(date => {

    const start = getSeatStartNumber(date);
    if (start === null) return;

    const d = new Date(date);
    const day = d.getDay();
    const dayText = (day === 0) ? "日" : "月";

    const title = document.createElement("div");
    title.className = "title";
    title.style.background = (day === 0) ? "#ffeaea" : "#f0f0f0";
    title.style.color = (day === 0) ? "red" : "black";
    title.textContent = `■ 読み手（${date} ${dayText}）`;
    app.appendChild(title);

    let used = 0;
    for (let i=0;i<SEAT_COUNT;i++) {
      if (data?.[date]?.[start+i]) used++;
    }

    const remain = SEAT_COUNT - used;

    const remainDiv = document.createElement("div");
    remainDiv.innerHTML =
      (remain===0)
      ? `<b style="color:#3399ff;">🔵 満席</b>`
      : `<b style="color:green;">🟢 空き：あと${remain}席</b>`;
    app.appendChild(remainDiv);


    for (let i=0;i<SEAT_COUNT;i++) {

      const seat = start+i;
      const name = data?.[date]?.[seat] || "";

      const row = document.createElement("div");
      row.className = "row";

      if (!name) row.classList.add("empty-row");
      else row.classList.add("filled-row");
      if (remain === 0) row.classList.add("full-row");

      const num = document.createElement("div");
      num.className = "num";
      num.textContent = seat;

      const docBtn = document.createElement("button");
      docBtn.textContent = "📄";
      docBtn.className = "icon-btn doc-btn";

      // ✅ 🎧 音声（完全修正版）
      const audioBtn = document.createElement("button");
      audioBtn.textContent = "🔊";
      audioBtn.className = "icon-btn audio-btn";

      audioBtn.onclick = () => {

        const id = formatSeatNumber(seat);

        // 同じボタン → 停止
        if (currentAudioBtn === audioBtn) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
          currentAudio.src = "";

          audioBtn.textContent = "🔊";
          if (currentRow) currentRow.classList.remove("playing");

          currentAudio = null;
          currentAudioBtn = null;
          currentRow = null;
          return;
        }

        // 完全停止
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
          currentAudio.src = "";
        }

        if (currentAudioBtn) currentAudioBtn.textContent = "🔊";
        if (currentRow) currentRow.classList.remove("playing");

        const audio = new Audio();

        const sources = [
          `audio/${id}.m4a`,
          `audio/${id}.aac`
        ];

        let index = 0;

        const tryPlay = async () => {

          if (index >= sources.length) {
            alert(`音声なし: ${id}`);
            return;
          }

          audio.src = sources[index];

          try {
            await audio.play();
          } catch {
            index++;
            tryPlay();
          }
        };

        audio.onended = () => {
          audioBtn.textContent = "🔊";
          if (currentRow) currentRow.classList.remove("playing");

          currentAudio = null;
          currentAudioBtn = null;
          currentRow = null;
        };

        tryPlay();

        currentAudio = audio;
        currentAudioBtn = audioBtn;

        audioBtn.textContent = "⏸";
        row.classList.add("playing");
        currentRow = row;
      };

      const label = document.createElement("div");
      label.className = "label";
      label.innerHTML = name
        ? `<b>${name}</b>`
        : `<span class="empty-label">🟢 空き</span>`;

      const editBtn = document.createElement("button");
      editBtn.className = "edit-btn";
      editBtn.textContent = (!name) ? "予約" : "編集";

      editBtn.onclick = () => {
        const input = prompt("名前入力（空欄で削除）", name);
        if (input === null) return;

        const ref = db.ref(`reservations/${date}/${seat}`);

        if (input.trim() === "") {
          ref.remove();
        } else {
          ref.set(input.trim());
        }
      };

      row.appendChild(num);
      row.appendChild(docBtn);
      row.appendChild(audioBtn);
      row.appendChild(label);
      row.appendChild(editBtn);

      app.appendChild(row);
    }

  });
}


// ✅ リアルタイム
db.ref("reservations").on("value", snap => {
  render(snap.val());
});

// ✅ CSV
function exportCSV() {
  db.ref("reservations").once("value", snap => {

    let csv = "日付,席番号,名前\n";

    const data = snap.val() || {};
    Object.entries(data).forEach(([date,seats])=>{
      Object.entries(seats).forEach(([seat,name])=>{
        csv += `${date},${seat},${name}\n`;
      });
    });

    const blob = new Blob([csv], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "reservations.csv";
    a.click();
  });
}

</script>

</body>
</html>
